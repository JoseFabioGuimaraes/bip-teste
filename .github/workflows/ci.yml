name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build base module (EJB)
        run: mvn -B clean install -f ejb-module/pom.xml -DskipTests

      - name: Build and test core module (Backend)
        run: mvn -B clean package -f backend-module/pom.xml

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-module-jar
          path: backend-module/target/*.jar
          if-no-files-found: error
